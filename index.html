<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel = "stylesheet" href = "styles.css" type = "text/css">
  <title>Frontend Mentor | Order summary card</title>
</head>
<body>
  <div class="summary-card">
    <div class = "main-comp">
      <img src = "images/illustration-hero.svg" alt = "Illustration Hero">
      <h1 class="heading">Order Summary</h1>
      <p class="summary-para">You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>
    </div>
    <div class = "middle-comp">
      <img src = "images/icon-music.svg" alt = "Music Icon">
      <div class="plan-text">
        <h3>Annual Plan</h3>
        <p>$59.99/year</p>
      </div>
      <div class="change-link">
        <a href = "#">Change</a>
      </div>
    </div>
    <button class="proceed-btn">Proceed to Payment</button>
    <button class="cancel-order">Cancel Order</button>
  </div>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Aparajit Balaji</a>.
  </div>
</body>
</html>
